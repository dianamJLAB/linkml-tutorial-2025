narad: 
  schema_version: '0.1'
  intent: NARAD extension for capability-layer semantics and facility-specific signal
    bindings
  capability_layer:
    profiles:
      MagnetCurrentControlProfileFamily:
        kind: Magnet
        description: Reusable NARAD magnet profile family separating shared current-oriented
          semantic signals from magnet-type-specific strength semantics.
        shared_capabilities:
          MagnetCurrentControlCapability:
            description: Shared current-control semantics for powered magnets.
            signals:
            - name: current_setpoint
              role: control
              data_type: float
              units: A
              description: Desired magnet current command.
            - name: current_readback
              role: readback
              data_type: float
              units: A
              description: Measured magnet current.
            - name: current_min
              role: constraint
              data_type: float
              units: A
              description: Minimum allowed current setting.
            - name: current_max
              role: constraint
              data_type: float
              units: A
              description: Maximum allowed current setting.
            - name: status
              role: status
              data_type: string
              units: null
              description: Power-supply or device state summary.
        magnet_type_profiles:
          QuadrupoleProfile:
            kind: Quadrupole
            description: Quadrupole magnet profile built from shared current-control
              semantics plus quadrupole-specific strength semantics.
            inherits_shared_capabilities:
            - MagnetCurrentControlCapability
            type_specific_capabilities:
            - id: quadrupole_focusing_control
              class: QuadrupoleStrengthCapability
              description: Control and observe the normalized quadrupole strength.
              signals:
              - name: strength_setpoint
                role: control
                data_type: float
                units: G/cm
                description: Desired integrated quadrupole strength or equivalent
                  model quantity.
          CorrectorProfileTemplate:
            kind: Corrector
            description: Template for corrector magnets reusing shared current-control
              semantics while defining corrector-specific strength or kick signals.
            inherits_shared_capabilities:
            - MagnetCurrentControlCapability
            type_specific_capabilities:
            - id: corrector_kick_control
              class: CorrectorKickCapability
              description: Template capability for corrector kick control.
              signals:
              - name: kick_setpoint
                role: control
                data_type: float
                units: T*m
                description: Desired integrated corrector kick or equivalent model
                  quantity.
          CorrectorProfile:
            kind: Corrector
            description: Corrector magnet profile built from shared current-control
              semantics plus corrector-specific kick semantics.
            inherits_shared_capabilities:
            - MagnetCurrentControlCapability
            type_specific_capabilities:
            - id: corrector_kick_control
              class: CorrectorKickCapability
              description: Control and observe the corrector kick.
              signals:
              - name: kick_setpoint
                role: control
                data_type: float
                units: T*m
                description: Desired integrated corrector kick or equivalent model
                  quantity.
          DipoleProfileTemplate:
            kind: Dipole
            description: Template for dipole magnets reusing shared current-control
              semantics while defining dipole-specific bend-field signals.
            inherits_shared_capabilities:
            - MagnetCurrentControlCapability
            type_specific_capabilities:
            - id: dipole_bend_control
              class: DipoleFieldCapability
              description: Template capability for dipole bend field control.
              signals:
              - name: field_setpoint
                role: control
                data_type: float
                units: T*m
                description: Desired dipole bend field or equivalent model quantity.
          DipoleProfile:
            kind: Dipole
            description: Dipole magnet profile built from shared current-control semantics
              plus dipole-specific bend-field semantics.
            inherits_shared_capabilities:
            - MagnetCurrentControlCapability
            type_specific_capabilities:
            - id: dipole_bend_control
              class: DipoleFieldCapability
              description: Control and observe the dipole bend field.
              signals:
              - name: field_setpoint
                role: control
                data_type: float
                units: T*m
                description: Desired dipole bend field or equivalent model quantity.
        graph_projection:
          node_labels:
            device: Magnet
            capability_family: CapabilityProfileFamily
            profile: CapabilityProfile
            capability: Capability
            signal: Signal
          relationships:
          - HAS_SHARED_CAPABILITY
          - HAS_TYPE_PROFILE
          - INHERITS_CAPABILITY
          - HAS_TYPE_SPECIFIC_CAPABILITY
          - HAS_SIGNAL
          - IMPLEMENTED_BY
          - BINDS_TO
          - LOCATED_IN
          - CONTROLLED_BY
      BPMInstrumentProfileFamily:
        kind: Instrument
        description: Reusable NARAD instrument profile family for beam position monitors.
        shared_capabilities:
          BPMPositionReadbackCapability:
            description: Shared readback semantics for beam position monitor instruments.
            signals:
            - name: horizontal_beam_position
              role: readback
              data_type: float
              units: mm
              description: Measured horizontal beam position.
            - name: vertical_beam_position
              role: readback
              data_type: float
              units: mm
              description: Measured vertical beam position.
            - name: status
              role: readback
              data_type: string
              units: null
              description: Beam position monitor status readback.
        instrument_type_profiles:
          BPMProfile:
            kind: BPM
            description: Beam position monitor instrument profile using shared BPM
              position readback semantics.
            inherits_shared_capabilities:
            - BPMPositionReadbackCapability
            type_specific_capabilities: []
        graph_projection:
          node_labels:
            device: Instrument
            capability_family: CapabilityProfileFamily
            profile: CapabilityProfile
            capability: Capability
            signal: Signal
          relationships:
          - HAS_SHARED_CAPABILITY
          - HAS_TYPE_PROFILE
          - INHERITS_CAPABILITY
          - HAS_SIGNAL
          - IMPLEMENTED_BY
          - BINDS_TO
          - LOCATED_IN
          - CONTROLLED_BY
      CavityGradientControlProfileFamily:
        kind: RFCavity
        description: Reusable NARAD cavity profile family for gradient control and
          readback semantics.
        shared_capabilities:
          CavityGradientControlCapability:
            description: Shared gradient-control semantics for RF cavities.
            signals:
            - name: gradient_setpoint
              role: control
              data_type: float
              units: MV/m
              description: Requested cavity gradient setpoint.
            - name: gradient_readback
              role: readback
              data_type: float
              units: MV/m
              description: Measured cavity gradient readback.
            - name: status
              role: status
              data_type: string
              units: null
              description: RF cavity status summary.
        cavity_type_profiles:
          RFCavityProfile:
            kind: RFCavity
            description: Generic RF cavity profile using shared gradient semantics.
            inherits_shared_capabilities:
            - CavityGradientControlCapability
            type_specific_capabilities: []
        graph_projection:
          node_labels:
            device: RFCavity
            capability_family: CapabilityProfileFamily
            profile: CapabilityProfile
            capability: Capability
            signal: Signal
          relationships:
          - HAS_SHARED_CAPABILITY
          - HAS_TYPE_PROFILE
          - INHERITS_CAPABILITY
          - HAS_SIGNAL
          - IMPLEMENTED_BY
          - BINDS_TO
          - LOCATED_IN
          - CONTROLLED_BY
  facility: UITF
  control_system: epics
  signal_layer:
    facilities:
      UITF:
        control_system: epics
        naming_convention: <device><signal_code>
        signal_definitions:
          shared_magnet_signals:
            current_setpoint:
              epics_suffix: .S
              description: EPICS current setpoint PV
            current_readback:
              epics_suffix: M
              description: EPICS current readback PV
            current_min:
              epics_suffix: .HMIN
              description: EPICS minimum current limit PV
            current_max:
              epics_suffix: .HMAX
              description: EPICS maximum current limit PV
            status:
              epics_suffix: .STAT
              description: EPICS status PV
          magnet_type_signals:
            Quadrupole:
              strength_setpoint:
                epics_suffix: .BDL
                description: EPICS quadrupole strength setpoint PV
            Corrector:
              kick_setpoint:
                epics_suffix: .KICK
                description: Template EPICS corrector kick setpoint PV
            Dipole:
              field_setpoint:
                epics_suffix: .BDL
                description: Template EPICS dipole bend field setpoint PV
          instrument_type_signals:
            BPM:
              horizontal_beam_position:
                epics_suffix: .XPOS
                description: EPICS BPM horizontal beam position readback PV
              vertical_beam_position:
                epics_suffix: .YPOS
                description: EPICS BPM vertical beam position readback PV
              status:
                epics_suffix: .STAT
                description: EPICS BPM status readback PV
          cavity_signals:
            gradient_setpoint:
              epics_suffix: :GSET
              description: EPICS cavity gradient setpoint PV
            gradient_readback:
              epics_suffix: :GMES
              description: EPICS cavity gradient readback PV
            status:
              epics_suffix: :STAT
              description: EPICS cavity status PV
